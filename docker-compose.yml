# ─────────────────────────────────────────────────────────────────────────────
# Ember — full local dev stack (no host installs required except Docker)
#
# Quick start:
#   cp .env.example .env          # safe local defaults — edit optional vars
#   docker compose up --build
#
# To reset the database:
#   docker compose run --rm migrate
#   (or: docker compose down -v && docker compose up --build)
#
# Ports exposed on the host:
#   3000  — web app (Next.js)
#   3001  — admin panel (Next.js)
#   54321 — Supabase API (Kong gateway)
#   54322 — Postgres (direct, for psql / GUI clients)
#   54323 — Supabase Studio (DB browser)
#   54324 — Inbucket (catch-all email UI)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.6.1.143
    restart: unless-stopped
    ports:
      - "54322:5432"
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Auth (GoTrue) ──────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.164.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"        # skip email verification in dev
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: "2500"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_SENDER_NAME: Ember

  # ── REST API (PostgREST) ───────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}

  # ── Realtime ──────────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.33.27
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_realtime_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"

  # ── Storage ───────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage

  # ── Image proxy (for storage image transforms) ────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro

  # ── API gateway ───────────────────────────────────────────────────────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
    volumes:
      - ./docker/kong.yml:/home/kong/kong.yml:ro

  # ── Postgres meta (used by Studio) ────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ── Supabase Studio (web DB browser) ──────────────────────────────────────
  studio:
    image: supabase/studio:20240729.083919
    restart: unless-stopped
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Ember
      DEFAULT_PROJECT_NAME: ember-local
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

  # ── Inbucket (catch-all email) ─────────────────────────────────────────────
  inbucket:
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - "54324:9000"

  # ── Migrations (runs once, then exits) ────────────────────────────────────
  migrate:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./docker/run-migrations.sh:/run-migrations.sh:ro
    command: ["sh", "/run-migrations.sh", "db", "postgres"]

  # ── Web app ───────────────────────────────────────────────────────────────
  # network_mode: host — lets the container reach localhost:54321 (Kong) and
  # lets the browser reach localhost:3000 (this container).
  # On TrueNAS / Linux this works natively.
  # On Docker Desktop (Mac/Windows) change to bridge and add extra_hosts below.
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Optional — add to .env to enable
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - .:/workspace
      - web-nm:/workspace/node_modules         # preserve container's node_modules
      - web-next:/workspace/apps/web/.next      # preserve Next.js build cache
    working_dir: /workspace
    command: pnpm --filter @ember/web dev

  # ── Admin panel ───────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3001
    volumes:
      - .:/workspace
      - admin-nm:/workspace/node_modules          # shared with web — same image
      - admin-next:/workspace/apps/admin/.next
    working_dir: /workspace
    command: pnpm --filter @ember/admin dev

volumes:
  db-data:
  storage-data:
  web-nm:
  web-next:
  admin-nm:
  admin-next:

# ── Mac/Windows Docker Desktop users ──────────────────────────────────────────
# Replace the web + admin services above with this override (or create a
# docker-compose.override.yml):
#
#   web:
#     network_mode: bridge
#     extra_hosts:
#       - "localhost:host-gateway"
#     ports:
#       - "3000:3000"
#
#   admin:
#     network_mode: bridge
#     extra_hosts:
#       - "localhost:host-gateway"
#     ports:
#       - "3001:3001"
