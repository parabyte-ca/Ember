# ─────────────────────────────────────────────────────────────────────────────
# Ember — full local dev stack (no host installs required except Docker)
#
# Quick start:
#   cp .env.example .env          # safe local defaults — edit optional vars
#   docker compose up --build
#
# To reset the database:
#   docker compose run --rm migrate
#   (or: docker compose down -v && docker compose up --build)
#
# Ports exposed on the host:
#   3500  — web app (Next.js)
#   3501  — admin panel (Next.js)
#   54321 — Supabase API (Kong gateway)
#   54322 — Postgres (direct, for psql / GUI clients)
#   54323 — Supabase Studio (DB browser)
#   54324 — Inbucket (catch-all email UI)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Database ───────────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    ports:
      - "54322:5432"
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Auth (GoTrue) ──────────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"        # skip email verification in dev
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: "2500"
      GOTRUE_SMTP_SENDER_NAME: Ember
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"

  # ── REST API (PostgREST) ───────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v14.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}

  # ── Realtime ──────────────────────────────────────────────────────────────
  realtime:
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
      RLIMIT_NOFILE: "10000"
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"

  # ── Storage ───────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.48.26
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      AUTH_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      STORAGE_PUBLIC_URL: http://localhost:54321/storage/v1
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage

  # ── Image proxy (for storage image transforms) ────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.30.1
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro

  # ── API gateway ───────────────────────────────────────────────────────────
  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: "1"
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./docker/kong.yml:/usr/local/kong/kong.yml:ro

  # ── Postgres meta (used by Studio) ────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.96.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}

  # ── Supabase Studio (web DB browser) ──────────────────────────────────────
  studio:
    image: supabase/studio:2026.04.27-sha-5f60601
    restart: unless-stopped
    ports:
      - "54323:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      DEFAULT_ORGANIZATION_NAME: Ember
      DEFAULT_PROJECT_NAME: ember-local
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
      PGRST_DB_SCHEMAS: public,graphql_public

  # ── Inbucket (catch-all email) ─────────────────────────────────────────────
  inbucket:
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - "54324:9000"

  # ── Migrations (runs once, then exits) ────────────────────────────────────
  migrate:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./docker/run-migrations.sh:/run-migrations.sh:ro
    command: ["sh", "/run-migrations.sh", "db", "postgres"]

  # ── Web app ───────────────────────────────────────────────────────────────
  # network_mode: host — lets the container reach localhost:54321 (Kong) and
  # lets the browser reach localhost:3500 (this container).
  # Works natively on Linux / TrueNAS.
  # Mac/Windows: see the override comment at the bottom of this file.
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3500
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - .:/workspace
      - web-nm:/workspace/node_modules
      - web-next:/workspace/apps/web/.next
    working_dir: /workspace
    command: pnpm --filter @ember/web dev

  # ── Admin panel ───────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: http://localhost:3501
    volumes:
      - .:/workspace
      - admin-nm:/workspace/node_modules
      - admin-next:/workspace/apps/admin/.next
    working_dir: /workspace
    command: pnpm --filter @ember/admin dev

volumes:
  db-data:
  storage-data:
  web-nm:
  web-next:
  admin-nm:
  admin-next:

# ── Mac/Windows Docker Desktop override ───────────────────────────────────────
# Create docker-compose.override.yml with:
#
#   services:
#     web:
#       network_mode: bridge
#       extra_hosts: ["localhost:host-gateway"]
#       ports: ["3500:3500"]
#     admin:
#       network_mode: bridge
#       extra_hosts: ["localhost:host-gateway"]
#       ports: ["3501:3501"]
